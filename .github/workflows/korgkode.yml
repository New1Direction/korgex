# KorgKode CI/CD — GitHub Action
#
# Runs KorgKode autonomously when:
# - An issue is labeled "korgkode"
# - A PR is opened or receives a review comment
#
# Install this file at: .github/workflows/korgkode.yml

name: KorgKode Autonomous Agent

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, labeled]
  pull_request_review_comment:
    types: [created]

jobs:
  korgkode:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'korgkode') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/korgkode')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'korgkode')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '/korgkode'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      checks: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Install KorgKode
        run: |
          git clone https://github.com/New1Direction/KorgKode.git /opt/korgkode
          pip install -r /opt/korgkode/requirements.txt
      
      - name: Setup GitHub Token
        run: |
          echo "KORGKODE_GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
          echo "KORGKODE_API_KEY=${{ secrets.KORGKODE_API_KEY }}" >> $GITHUB_ENV
          echo "KORGKODE_MODEL=${{ secrets.KORGKODE_MODEL }}" >> $GITHUB_ENV
      
      - name: Run KorgKode on Issue
        if: github.event_name == 'issues' && github.event.label.name == 'korgkode'
        run: |
          /opt/korgkode/korgkode.sh \
            "Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}
             ${{ github.event.issue.body }}"
        env:
          KORGKODE_SANDBOX: docker
      
      - name: Run KorgKode on PR
        if: github.event_name == 'pull_request'
        run: |
          /opt/korgkode/korgkode.sh \
            "PR #${{ github.event.pull_request.number }}: ${{ github.event.pull_request.title }}
             ${{ github.event.pull_request.body }}"
        env:
          KORGKODE_SANDBOX: docker
      
      - name: Run KorgKode on Comment
        if: contains(github.event.comment.body, '/korgkode')
        run: |
          /opt/korgkode/korgkode.sh \
            "Address feedback: ${{ github.event.comment.body }}"
        env:
          KORGKODE_SANDBOX: docker
      
      - name: Create Summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const summary = fs.readFileSync('/tmp/korgkode-summary.md', 'utf8').catch(() => 'Task completed by KorgKode.');
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 KorgKode Complete\n\n${summary}\n\n---\n*Powered by [KorgKode](https://github.com/New1Direction/KorgKode)*`
            });