# Korgex CI/CD — GitHub Action
#
# Runs Korgex autonomously when:
# - An issue is labeled "korgex"
# - A PR is opened or receives a review comment
#
# Install this file at: .github/workflows/korgex.yml

name: Korgex Autonomous Agent

on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, synchronize, labeled]
  pull_request_review_comment:
    types: [created]

jobs:
  korgex:
    if: |
      (github.event_name == 'issues' && github.event.label.name == 'korgex') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/korgex')) ||
      (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'korgex')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '/korgex'))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
      checks: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: Install Korgex
        run: |
          # Pin to a release tag — never install whatever happens to be on the
          # default branch when CI runs, since that's a supply-chain hole.
          git clone --depth 1 --branch v0.2.2 https://github.com/New1Direction/Korgex.git /opt/korgex
          pip install -r /opt/korgex/requirements.txt
          # Install the package itself so the `korgex` console script becomes available.
          pip install /opt/korgex
      
      - name: Setup GitHub Token
        run: |
          echo "KORGEX_GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> $GITHUB_ENV
          echo "KORGEX_API_KEY=${{ secrets.KORGEX_API_KEY }}" >> $GITHUB_ENV
          echo "KORGEX_MODEL=${{ secrets.KORGEX_MODEL }}" >> $GITHUB_ENV

      - name: Verify required secrets
        # Fail fast — if the repo secret is missing, the job otherwise runs all
        # the way through setup before korgex itself errors out on auth.
        env:
          KORGEX_API_KEY: ${{ secrets.KORGEX_API_KEY }}
        run: |
          if [ -z "$KORGEX_API_KEY" ]; then
            echo "::error::KORGEX_API_KEY secret is not configured. Set it in Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Build prompt from event payload
        # Never interpolate untrusted issue/PR/comment text directly into shell.
        # Read the checked-out webhook payload from GITHUB_EVENT_PATH and write a
        # prompt file instead, so titles/bodies/comments cannot break shell quoting.
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          event_name = os.environ["GITHUB_EVENT_NAME"]
          event_path = Path(os.environ["GITHUB_EVENT_PATH"])
          data = json.loads(event_path.read_text(encoding="utf-8"))

          if event_name == "issues":
              issue = data.get("issue", {})
              prompt = f"Issue #{issue.get('number', 'unknown')}: {issue.get('title', '')}\n{issue.get('body') or ''}"
          elif event_name == "pull_request":
              pr = data.get("pull_request", {})
              prompt = f"PR #{pr.get('number', 'unknown')}: {pr.get('title', '')}\n{pr.get('body') or ''}"
          elif event_name == "issue_comment":
              issue = data.get("issue", {})
              comment = data.get("comment", {})
              prompt = (
                  f"Address feedback on issue/PR #{issue.get('number', 'unknown')} "
                  f"({issue.get('title', '')}):\n{comment.get('body') or ''}"
              )
          elif event_name == "pull_request_review_comment":
              pr = data.get("pull_request", {})
              comment = data.get("comment", {})
              path = comment.get("path")
              line = comment.get("line") or comment.get("original_line")
              location = f" on {path}:{line}" if path and line else (f" on {path}" if path else "")
              prompt = (
                  f"Address PR review feedback for PR #{pr.get('number', 'unknown')}{location}:\n"
                  f"{comment.get('body') or ''}"
              )
          else:
              raise SystemExit(f"Unsupported event: {event_name}")

          out = Path(os.environ["RUNNER_TEMP"]) / "korgex-prompt.txt"
          out.write_text(prompt, encoding="utf-8")
          print(f"Wrote Korgex prompt to {out} ({len(prompt)} chars)")
          PY

      - name: Run Korgex
        # Execute with subprocess argv, not shell interpolation of prompt content.
        run: |
          python - <<'PY'
          import os
          import subprocess
          from pathlib import Path

          prompt = (Path(os.environ["RUNNER_TEMP"]) / "korgex-prompt.txt").read_text(encoding="utf-8")
          subprocess.run(["korgex", prompt], check=True)
          PY
        env:
          KORGEX_SANDBOX: docker
      
      - name: Create Summary
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            // readFileSync is synchronous — wrap in try/catch instead of .catch().
            let summary;
            try {
              summary = fs.readFileSync('/tmp/korgex-summary.md', 'utf8');
            } catch {
              summary = 'Task completed by Korgex.';
            }
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## 🤖 Korgex Complete\n\n${summary}\n\n---\n*Powered by [Korgex](https://github.com/New1Direction/Korgex)*`
            });