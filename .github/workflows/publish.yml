name: Publish to PyPI

# Publishes korgex to PyPI automatically when a GitHub Release is published,
# and on demand via the "Run workflow" button (Actions tab). Uses PyPI Trusted
# Publishing (OIDC) — no API token is stored anywhere.
#
# ONE-TIME setup on PyPI (Project → Publishing → Add a trusted publisher):
#   Owner: New1Direction   Repository: korgex   Workflow: publish.yml
# After that, releasing (or clicking Run workflow) ships it — zero manual twine.

on:
  release:
    types: [published]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write          # required for Trusted Publishing (OIDC)
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build
          python -m build

      - name: Verify the artifacts
        run: |
          python -m pip install --upgrade twine
          python -m twine check dist/*

      - name: Publish to PyPI (Trusted Publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
